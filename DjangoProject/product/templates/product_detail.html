{% extends "base/base.html" %}
{% load static %}

{% block contents %}

        <h2>product list</h2>
    <div class="container">
        <div class = "row">

                         <div class="card " style = "width :18rem;">
                             <img src="{{product.image.url}}" class="card-img-top" alt="{{ product.title }}" height="200px">
                             <div class="card-body">
                                 <p>{{ product.date_created | timesince}} ago</p>
                                 <h5 class="card-title">{{ product.title |title }}</h5>
                                 <p class="card-text">{{ product.description}}</p>
                                  <p class="card-text">{{ product.price}}</p>
{#                              <a href="/product-fb/{{ product.id }}" class="btn btn-primary">show</a>#}
                             </div>
                         </div>



        </div>
    </div>
{% endblock %}
