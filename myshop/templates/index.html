<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فروشگاه الکتروصنعت امگا | صفحه اصلی</title>
    <link rel="stylesheet" href="assets/css/cart.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
    <link
      rel="stylesheet"
      href="bootstrap-pack/bootstrap-icons/bootstrap-icons.css"
    />
  </head>
  <body data-page="home">
    {% include 'loader.html' %}
    <div id="site-header"></div>

    <main class="page-shell">
      <section
        class="section-shortcuts container"
        id="section-shortcuts"
      ></section>
      <div class="container" id="trust-strip-mount"></div>

      <!-- CTA: iPhone Tasviri recommender -->
      <section class="wizard-hero container">
        <div class="wizard-hero-content">
          <div class="wizard-hero-text">
            <span class="wizard-hero-tag"
              ><i class="bi bi-cpu"></i> راهنمای خرید هوشمند</span
            >
            <h1 class="wizard-hero-title">خرید آیفون تصویری</h1>
            <p class="wizard-hero-desc">
              نمی‌دونی چی بخری؟ ما کمکت می‌کنیم! با ۳ سوال ساده بهترین آیفون
              تصویری رو برات پیدا می‌کنیم.
            </p>
            <a
              class="wizard-hero-btn"
              id="wizard-start-btn"
              href="#wizard-root"
              data-wizard-start
            >
              <i class="bi bi-play-circle-fill"></i> شروع کن
            </a>
          </div>
          <div class="wizard-hero-img-wrap">
            <img
              src="assets/images/iphone-char.png"
              alt="راهنمای آیفون تصویری"
              class="wizard-hero-img"
              onerror="this.style.display = 'none'"
            />
            <div class="wizard-hero-float">
              <i class="bi bi-stars"></i>
              <span>۳ سوال کافیه!</span>
            </div>
          </div>
        </div>
      </section>

      <section class="hero-section container" id="hero-section">
        <div class="hero-slider" id="hero-slider"></div>
        <div class="hero-dots" id="hero-dots"></div>
      </section>

      <section class="home-sections container" id="home-sections"></section>

      <section class="contact-section container" id="home-contact"></section>
    </main>

    <div id="site-footer"></div>
    <script src="assets/js/cart.js" defer></script>

    <script src="assets/js/data-service.js" defer></script>
    <script src="assets/js/components.js" defer></script>
    <script src="assets/js/layout-loader.js" defer></script>
    <script src="assets/js/page-home.js" defer></script>
    <script src="assets/js/page-category.js" defer></script>
    <script src="assets/js/page-product.js" defer></script>
    <script src="assets/js/animate.js" defer></script>
    <script src="assets/js/app.js" defer></script>
  </body>
</html>
