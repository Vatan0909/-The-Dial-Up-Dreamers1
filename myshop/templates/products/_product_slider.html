<section class="slider-section" {% if section_id %}id="{{ section_id }}"{% endif %}>
  <div class="section-head">
    <div class="section-head-left">
      <h3>{{ title }}</h3>
    </div>
    {% if see_all_url %}
      <a class="see-all-btn" href="{{ see_all_url }}">مشاهده همه <i class="bi bi-arrow-left-short"></i></a>
    {% endif %}
  </div>

  {% if products %}
    <div class="slider-wrap">
      <div class="slider-track" data-server-slider>
        {% for product in products %}
          <div class="slider-item">
            {% include 'products/_product_card.html' with product=product %}
          </div>
        {% endfor %}
      </div>
      <div class="slider-dots"></div>
      <div class="slider-nav">
        <button type="button" aria-label="قبلی"><i class="bi bi-chevron-right"></i></button>
        <button type="button" aria-label="بعدی"><i class="bi bi-chevron-left"></i></button>
      </div>
    </div>
  {% else %}
    <div class="empty-state">
      <i class="bi bi-inbox" style="font-size:2rem;opacity:.4;display:block;margin-bottom:.5rem"></i>
      در این بخش محصولی ثبت نشده است.
    </div>
  {% endif %}
</section>
