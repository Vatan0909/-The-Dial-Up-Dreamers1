{% load static %}
<header class="site-header" id="main-header">
  <div class="top-bar">
    <div class="container top-bar-inner">
      <a class="brand" href="{% url 'products:home' %}" aria-label="صفحه اصلی">
        <div class="brand-logo-wrap">
          <img
            class="brand-logo"
            src="{% static 'assets/images/OmegaLogo.jpg' %}"
            alt="لوگوی فروشگاه"
          />
        </div>
        <div class="brand-name" id="shop-name">فروشگاه الکتروصنعت امگا</div>
      </a>

      <form class="header-search" action="{% url 'products:search' %}" method="get">
        <input type="text" name="q" placeholder="جستجوی محصولات..." />
        <button type="submit">
          <i class="bi bi-search"></i>
        </button>
      </form>

      <div class="top-actions">
        <a class="utility-btn" id="auth-link" href="{%url 'auth'%}">
          <span class="icon" aria-hidden="true"
            ><i class="bi bi-person-circle"></i
          ></span>
          <span id="header-auth-text">ثبت نام / ورود</span>
        </a>
        <a class="utility-btn cart-btn" id="cart-link" href="#">
          <span class="icon" aria-hidden="true"
            ><i class="bi bi-cart3"></i
          ></span>
          <span id="header-cart-text">سبد خرید</span>
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="container nav-inner">
      <div class="category-dropdown" id="category-dropdown-wrap">
        <button
          class="category-toggle"
          id="category-toggle"
          type="button"
          aria-expanded="false"
        >
          <span class="icon" aria-hidden="true"
            ><i class="bi bi-grid-3x3-gap"></i
          ></span>
          <span id="header-menu-title">دسته بندی</span>
          <span class="icon" aria-hidden="true"
            ><i class="bi bi-chevron-down"></i
          ></span>
        </button>
        <ul class="dropdown-menu" id="category-menu-list"></ul>
      </div>

      <nav class="desktop-nav" id="desktop-nav"></nav>

      <button
        class="mobile-menu-toggle"
        id="mobile-menu-toggle"
        type="button"
        aria-label="باز کردن منو"
      >
        <i class="bi bi-list"></i>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" id="mobile-nav" aria-label="دسته بندی موبایل">
    <ul class="mobile-nav-list" id="mobile-category-list"></ul>
  </nav>

  {% if stories %}
  <div class="story-bar" id="story-bar">
    <div class="container story-bar-inner" id="story-circles">
      {% for story in stories %}
        <button
          class="story-circle"
          type="button"
          aria-label="{{ story.title }}"
          data-story-title="{{ story.title }}"
          {% if story.video %}data-story-video="{{ story.video.url }}"{% endif %}
          {% if story.image %}data-story-image="{{ story.image.url }}"{% endif %}
          {% if story.link %}data-story-link="{{ story.link }}"{% endif %}
        >
          <span class="story-ring">
            {% if story.image %}
              <img src="{{ story.image.url }}" alt="{{ story.title }}">
            {% else %}
              <span class="story-video-thumb"><i class="bi bi-play-fill"></i></span>
            {% endif %}
          </span>
          <span class="story-label">{{ story.title }}</span>
        </button>
      {% endfor %}
    </div>
  </div>
  {% endif %}
</header>

<!-- Video Story Modal -->
<div class="story-modal" id="story-modal" style="display:none;" onclick="closeStoryModal(event)">
  <button class="story-modal-close" onclick="closeStoryModal()" aria-label="بستن">
    <i class="bi bi-x-lg"></i>
  </button>
  <div class="story-modal-inner">
    <div class="story-modal-title" id="story-modal-title"></div>
    <div class="story-modal-video" id="story-modal-video"></div>
  </div>
</div>
