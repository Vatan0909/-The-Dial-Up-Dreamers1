{% extends 'base/base.html' %}

{% load static %}

{% block contents %}
<div class="container">
    <div class="row">
        <div class="col-md-6">
            <h1>تست فرم لاگین</h1>
            <p>این متن رو میبینی؟</p>

            <form action="" method="post">
                {% csrf_token %}

                <label>Username:</label>
                {{ login_form.username }}

                <label>Password:</label>
                {{ login_form.password }}

                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
